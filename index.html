<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учёт товара</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 10px; color: #333; }
        h1 { font-size: 1.2em; text-align: center; color: #2c3e50; }
        .tab-bar { display: flex; justify-content: center; margin: 10px 0; }
        .tab { padding: 10px 12px; background: #ddd; cursor: pointer; font-size: 0.8em; border-radius: 8px 8px 0 0; margin: 0 2px; }
        .tab.active { background: #3498db; color: white; }
        .panel { display: none; background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .panel.active { display: block; }
        input, button, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 1em; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; font-weight: bold; }
        button:active { background: #2980b9; }
        .success { background: #27ae60; }
        .danger { background: #e74c3c; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: #3498db; color: white; padding: 8px; text-align: left; }
        td { padding: 6px; border-bottom: 1px solid #eee; }
        .report-box { background: #ecf0f1; padding: 12px; border-radius: 8px; margin: 8px 0; }
        .green { color: #27ae60; }
        .red { color: #e74c3c; }
        #status { text-align: center; color: #aaa; font-size: 0.8em; margin: 5px; }
        small { color: #888; }
    </style>
</head>
<body>
    <h1>📦 Учёт товара</h1>
    <p id="status">🔄 Загрузка данных...</p>
    
    <div class="tab-bar">
        <div class="tab active" onclick="showTab('income')">📥 Приёмка</div>
        <div class="tab" onclick="showTab('sale')">💰 Продажа</div>
        <div class="tab" onclick="showTab('stock')">📋 Товары</div>
        <div class="tab" onclick="showTab('report')">📊 Отчёт</div>
    </div>
    
    <div id="income" class="panel active">
        <h3>Добавить приход</h3>
        <input type="text" id="inc_name" placeholder="Название товара">
        <input type="number" id="inc_qty" placeholder="Количество" step="any">
        <input type="number" id="inc_price" placeholder="Закупочная цена за шт." step="any">
        <button class="success" onclick="addIncome()">✅ Записать приход</button>
    </div>
    
    <div id="sale" class="panel">
        <h3>Записать продажу</h3>
        <select id="sale_item"></select>
        <input type="number" id="sale_qty" placeholder="Остаток на конец дня" step="any">
        <input type="number" id="sale_price" placeholder="Цена продажи за шт." step="any">
        <button onclick="addSale()">💸 Записать продажу</button>
    </div>
    
    <div id="stock" class="panel">
        <h3>Текущие остатки</h3>
        <div id="stock_list"></div>
        <hr>
        <button class="danger" onclick="clearAll()">🗑 Сбросить всё</button>
    </div>
    
    <div id="report" class="panel">
        <h3>📊 Отчёт</h3>
        <div id="report_content"><p>Добавьте товары и продажи.</p></div>
    </div>

    <script>
        // Облачное хранилище через jsonbin.io (бесплатный API)
        var BIN_ID = localStorage.getItem("bin_id") || "";
        var API_KEY = "$2a$10$YOUR_API_KEY"; // ЗАМЕНИТЕ НА СВОЙ КЛЮЧ с jsonbin.io
        var BASE_URL = "https://api.jsonbin.io/v3/b";

        var data = { items: {} };

        // Загрузка данных из облака
        function loadCloudData() {
            if (!BIN_ID) {
                // Создаём новое хранилище
                createBin();
                return;
            }
            document.getElementById("status").textContent = "🔄 Загрузка...";
            fetch(BASE_URL + "/" + BIN_ID, {
                headers: { "X-Master-Key": API_KEY }
            })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                data = res.record;
                document.getElementById("status").textContent = "🟢 Готово";
                renderSaleSelect();
                renderStock();
            })
            .catch(function() {
                document.getElementById("status").textContent = "⚠️ Ошибка загрузки. Работаем локально.";
            });
        }

        function createBin() {
            fetch(BASE_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify({ items: {} })
            })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                BIN_ID = res.metadata.id;
                localStorage.setItem("bin_id", BIN_ID);
                data = { items: {} };
                document.getElementById("status").textContent = "🟢 Хранилище создано";
            })
            .catch(function() {
                document.getElementById("status").textContent = "⚠️ Не удалось создать хранилище.";
            });
        }

        // Сохранение в облако
        function saveToCloud() {
            if (!BIN_ID) return;
            fetch(BASE_URL + "/" + BIN_ID, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify(data)
            })
            .then(function() {
                document.getElementById("status").textContent = "🟢 Сохранено в облаке";
            })
            .catch(function() {
                document.getElementById("status").textContent = "⚠️ Не сохранено. Проверьте интернет.";
            });
        }

        function showTab(id) {
            document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            if (id === 'stock') renderStock();
            if (id === 'report') renderReport();
            if (id === 'sale') renderSaleSelect();
        }

        function addIncome() {
            var name = document.getElementById("inc_name").value.trim();
            var qty = parseFloat(document.getElementById("inc_qty").value);
            var price = parseFloat(document.getElementById("inc_price").value);
            if (!name || isNaN(qty) || isNaN(price) || qty <= 0) {
                alert("Заполните все поля корректно!"); return;
            }
            if (!data.items[name]) {
                data.items[name] = { qty: 0, cost: 0, sold: 0, revenue: 0, salePrice: 0 };
            }
            data.items[name].qty += qty;
            data.items[name].cost = price;
            saveToCloud();
            document.getElementById("inc_name").value = "";
            document.getElementById("inc_qty").value = "";
            document.getElementById("inc_price").value = "";
            alert("Приход: " + name + " +" + qty + " шт.");
            renderSaleSelect();
        }

        function renderSaleSelect() {
            var sel = document.getElementById("sale_item");
            sel.innerHTML = "";
            for (var name in data.items) {
                if (data.items[name].qty > 0) {
                    var opt = document.createElement("option");
                    opt.value = name;
                    opt.textContent = name + " (на складе: " + data.items[name].qty + " шт.)";
                    sel.appendChild(opt);
                }
            }
        }

        function addSale() {
            var name = document.getElementById("sale_item").value;
            var endQty = parseFloat(document.getElementById("sale_qty").value);
            var salePrice = parseFloat(document.getElementById("sale_price").value);
            if (!name || isNaN(endQty) || isNaN(salePrice)) { alert("Заполните все поля!"); return; }
            var item = data.items[name];
            if (!item || item.qty < endQty) {
                alert("Остаток не может быть больше, чем есть на складе (" + (item ? item.qty : 0) + ")"); return;
            }
            var soldQty = item.qty - endQty;
            item.sold += soldQty;
            item.revenue += soldQty * salePrice;
            item.salePrice = salePrice;
            item.qty = endQty;
            saveToCloud();
            document.getElementById("sale_qty").value = "";
            document.getElementById("sale_price").value = "";
            alert("Продано: " + name + " -" + soldQty + " шт. на " + (soldQty * salePrice) + " руб.");
            renderSaleSelect();
        }

        function renderStock() {
            var html = '<table><tr><th>Товар</th><th>Остаток</th><th>Закуп.цена</th></tr>';
            for (var name in data.items) {
                var item = data.items[name];
                if (item.qty > 0 || item.sold > 0) {
                    html += '<tr><td>' + name + '</td><td>' + item.qty + '</td><td>' + item.cost + ' руб.</td></tr>';
                }
            }
            html += '</table>';
            document.getElementById("stock_list").innerHTML = html;
        }

        function renderReport() {
            var totalRevenue = 0, totalProfit = 0, html = "";
            for (var name in data.items) {
                var item = data.items[name];
                if (item.sold > 0) {
                    var cost = item.sold * item.cost;
                    var revenue = item.revenue;
                    var profit = revenue - cost;
                    totalRevenue += revenue;
                    totalProfit += profit;
                    html += '<div class="report-box"><b>' + name + '</b><br>';
                    html += 'Продано: ' + item.sold + ' шт.<br>';
                    html += 'Выручка: ' + revenue + ' руб.<br>';
                    html += 'Прибыль: <span class="' + (profit >= 0 ? 'green' : 'red') + '">' + profit + ' руб.</span></div>';
                }
            }
            html = '<div class="report-box" style="background:#2c3e50; color:white;"><b>ИТОГО</b><br>Выручка: ' + totalRevenue + ' руб.<br>Прибыль: <span class="green">' + totalProfit + ' руб.</span></div>' + html;
            document.getElementById("report_content").innerHTML = html || '<p>Нет данных.</p>';
        }

        function clearAll() {
            if (confirm("Точно удалить ВСЕ данные? Это необратимо!")) {
                data = { items: {} };
                saveToCloud();
                alert("Данные удалены.");
                renderStock();
                renderReport();
            }
        }

        // Запуск
        loadCloudData();
    </script>
</body>
</html>
