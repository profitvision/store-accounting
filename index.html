<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учёт товара</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 10px; color: #333; }
        h1 { font-size: 1.2em; text-align: center; color: #2c3e50; }
        .tab-bar { display: flex; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
        .tab { padding: 10px 12px; background: #ddd; cursor: pointer; font-size: 0.8em; border-radius: 8px 8px 0 0; margin: 0 2px; }
        .tab.active { background: #3498db; color: white; }
        .panel { display: none; background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .panel.active { display: block; }
        input, button, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 1em; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; font-weight: bold; }
        button:active { background: #2980b9; }
        .success { background: #27ae60; }
        .danger { background: #e74c3c; }
        .row { display: flex; gap: 5px; }
        .row select { width: 40%; }
        .row input { width: 60%; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: #3498db; color: white; padding: 8px; text-align: left; }
        td { padding: 6px; border-bottom: 1px solid #eee; }
        .report-box { background: #ecf0f1; padding: 12px; border-radius: 8px; margin: 8px 0; }
        .green { color: #27ae60; }
        .red { color: #e74c3c; }
        #status { text-align: center; color: #aaa; font-size: 0.8em; margin: 5px; }
        .backup-bar { background: #fff3cd; padding: 8px; border-radius: 8px; margin: 10px 0; text-align: center; font-size: 0.85em; }
        .btn-small { width: auto; display: inline-block; padding: 8px 15px; font-size: 0.85em; margin: 3px; }
        .unit-toggle { display: flex; gap: 5px; margin: 5px 0; }
        .unit-toggle button { flex: 1; padding: 8px; font-size: 0.9em; background: #ddd; color: #333; }
        .unit-toggle button.active { background: #3498db; color: white; }
        label { font-size: 0.9em; color: #666; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>📦 Учёт товара</h1>
    <p id="status">🟢 Готово</p>
    
    <div class="tab-bar">
        <div class="tab active" onclick="showTab('income')">📥 Приёмка</div>
        <div class="tab" onclick="showTab('sale')">💰 Продажа</div>
        <div class="tab" onclick="showTab('stock')">📋 Товары</div>
        <div class="tab" onclick="showTab('report')">📊 Отчёт</div>
    </div>
    
    <div id="income" class="panel active">
        <h3>Добавить приход</h3>
        <input type="text" id="inc_name" placeholder="Название товара">
        
        <label>Единица измерения:</label>
        <div class="unit-toggle" id="unitToggle">
            <button class="active" onclick="setUnit('шт', this)">шт.</button>
            <button onclick="setUnit('кг', this)">кг</button>
            <button onclick="setUnit('г', this)">г</button>
            <button onclick="setUnit('л', this)">л</button>
            <button onclick="setUnit('уп', this)">уп.</button>
        </div>
        
        <input type="number" id="inc_qty" placeholder="Количество" step="any">
        <input type="number" id="inc_price" placeholder="Закупочная цена за единицу" step="any">
        <button class="success" onclick="addIncome()">✅ Записать приход</button>
    </div>
    
    <div id="sale" class="panel">
        <h3>Записать продажу</h3>
        <select id="sale_item"></select>
        <input type="number" id="sale_qty" placeholder="Остаток на конец дня" step="any">
        <input type="number" id="sale_price" placeholder="Цена продажи за единицу" step="any">
        <button onclick="addSale()">💸 Записать продажу</button>
    </div>
    
    <div id="stock" class="panel">
        <h3>Текущие остатки</h3>
        <div id="stock_list"></div>
    </div>
    
    <div id="report" class="panel">
        <h3>📊 Отчёт</h3>
        <div id="report_content"><p>Добавьте товары и продажи.</p></div>
    </div>

    <div class="backup-bar">
        <button class="btn-small" onclick="exportData()">📤 Скачать backup</button>
        <button class="btn-small" onclick="document.getElementById('importFile').click()">📥 Восстановить</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <script>
        var data = { items: {} };
        var currentUnit = "шт";

        function setUnit(unit, btn) {
            currentUnit = unit;
            document.querySelectorAll("#unitToggle button").forEach(function(b) { b.classList.remove("active"); });
            btn.classList.add("active");
        }

        function loadData() {
            var saved = localStorage.getItem("store_data_v3");
            if (saved) {
                try { data = JSON.parse(saved); } catch(e) { data = { items: {} }; }
            }
            renderSaleSelect();
        }

        function saveData() {
            localStorage.setItem("store_data_v3", JSON.stringify(data));
        }

        function exportData() {
            var blob = new Blob([JSON.stringify(data)], { type: "application/json" });
            var a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "backup_" + new Date().toISOString().slice(0,10) + ".json";
            a.click();
            document.getElementById("status").textContent = "🟢 Backup скачан";
        }

        function importData(event) {
            var file = event.target.files[0];
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    data = JSON.parse(e.target.result);
                    saveData();
                    document.getElementById("status").textContent = "🟢 Данные восстановлены!";
                    renderSaleSelect();
                    renderStock();
                } catch(err) { alert("Ошибка в файле!"); }
            };
            reader.readAsText(file);
        }

        function showTab(id) {
            document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            if (id === 'stock') renderStock();
            if (id === 'report') renderReport();
            if (id === 'sale') renderSaleSelect();
        }

        function addIncome() {
            var name = document.getElementById("inc_name").value.trim();
            var qty = parseFloat(document.getElementById("inc_qty").value);
            var price = parseFloat(document.getElementById("inc_price").value);
            if (!name || isNaN(qty) || isNaN(price) || qty <= 0) {
                alert("Заполните все поля корректно!"); return;
            }
            var key = name + "|" + currentUnit;
            if (!data.items[key]) {
                data.items[key] = { name: name, unit: currentUnit, qty: 0, cost: 0, sold: 0, revenue: 0, salePrice: 0 };
            }
            data.items[key].qty += qty;
            data.items[key].cost = price;
            saveData();
            document.getElementById("inc_name").value = "";
            document.getElementById("inc_qty").value = "";
            document.getElementById("inc_price").value = "";
            document.getElementById("status").textContent = "🟢 Приход: " + name + " +" + qty + " " + currentUnit;
            renderSaleSelect();
        }

        function renderSaleSelect() {
            var sel = document.getElementById("sale_item");
            sel.innerHTML = "";
            for (var key in data.items) {
                var item = data.items[key];
                if (item.qty > 0) {
                    var opt = document.createElement("option");
                    opt.value = key;
                    opt.textContent = item.name + " (остаток: " + item.qty + " " + item.unit + ")";
                    sel.appendChild(opt);
                }
            }
        }

        function addSale() {
            var key = document.getElementById("sale_item").value;
            var endQty = parseFloat(document.getElementById("sale_qty").value);
            var salePrice = parseFloat(document.getElementById("sale_price").value);
            if (!key || isNaN(endQty) || isNaN(salePrice)) { alert("Заполните все поля!"); return; }
            var item = data.items[key];
            if (!item || item.qty < endQty) {
                alert("Остаток не может быть больше, чем есть (" + (item ? item.qty + " " + item.unit : 0) + ")"); return;
            }
            var soldQty = item.qty - endQty;
            item.sold += soldQty;
            item.revenue += soldQty * salePrice;
            item.salePrice = salePrice;
            item.qty = endQty;
            saveData();
            document.getElementById("sale_qty").value = "";
            document.getElementById("sale_price").value = "";
            document.getElementById("status").textContent = "🟢 Продано: " + item.name + " -" + soldQty + " " + item.unit;
            renderSaleSelect();
        }

        function renderStock() {
            var html = '<table><tr><th>Товар</th><th>Остаток</th><th>Закуп.цена</th></tr>';
            for (var key in data.items) {
                var item = data.items[key];
                if (item.qty > 0 || item.sold > 0) {
                    html += '<tr><td>' + item.name + '</td><td>' + item.qty + ' ' + item.unit + '</td><td>' + item.cost + ' руб/' + item.unit + '</td></tr>';
                }
            }
            html += '</table>';
            document.getElementById("stock_list").innerHTML = html || '<p>Нет товаров.</p>';
        }

        function renderReport() {
            var totalRevenue = 0, totalProfit = 0, html = "";
            for (var key in data.items) {
                var item = data.items[key];
                if (item.sold > 0) {
                    var cost = item.sold * item.cost;
                    var revenue = item.revenue;
                    var profit = revenue - cost;
                    totalRevenue += revenue;
                    totalProfit += profit;
                    html += '<div class="report-box"><b>' + item.name + '</b> (' + item.unit + ')<br>';
                    html += 'Продано: ' + item.sold + ' ' + item.unit + '<br>';
                    html += 'Выручка: ' + revenue + ' руб.<br>';
                    html += 'Прибыль: <span class="' + (profit >= 0 ? 'green' : 'red') + '">' + profit + ' руб.</span></div>';
                }
            }
            html = '<div class="report-box" style="background:#2c3e50; color:white;"><b>ИТОГО</b><br>Выручка: ' + totalRevenue + ' руб.<br>Прибыль: <span class="green">' + totalProfit + ' руб.</span></div>' + html;
            document.getElementById("report_content").innerHTML = html || '<p>Нет данных о продажах.</p>';
        }

        function clearAll() {
            if (confirm("Точно удалить ВСЕ данные?")) {
                data = { items: {} };
                saveData();
                document.getElementById("status").textContent = "🟢 Данные удалены";
                renderStock();
                renderReport();
            }
        }

        loadData();
        renderSaleSelect();
    </script>
</body>
</html>
